<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand text-primary" href="#">MySite</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">

    <!-- Headings -->
   

    <!-- Background Color Boxes -->
    <div class="p-3 mb-3 bg-warning text-dark rounded">
        This is a Warning Background
    </div>
    <div class="p-3 mb-3 bg-info text-white rounded">
        This is an Info Background
    </div>

    <!-- Alerts with Dismiss Button -->
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        This is a Success Alert!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        This is a Danger Alert!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Buttons with spacing -->
    <div class="mb-4">
        <button class="btn btn-primary me-2">Primary Button</button>
        <button class="btn btn-success me-2">Success Button</button>
        <button class="btn btn-danger">Danger Button</button>
    </div>

    <!-- Badges -->
    <h3>
        Notifications <span class="badge bg-danger">5</span>
    </h3>
    <button class="btn btn-info mt-2">
        Messages <span class="badge bg-dark">10</span>
    </button>

    <!-- Card Example -->
    <div class="card mt-5 shadow-sm">
        <div class="card-body">
            <h5 class="card-title text-primary">Bootstrap Card</h5>
            <p class="card-text">This is an example card with shadow and rounded corners. Cards are useful for highlighting content.</p>
            <a href="#" class="btn btn-primary">Read More</a>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
